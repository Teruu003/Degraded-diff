data:
    dataset: "FFHQ"
    image_size: 64
    channels: 3
    num_workers: 4
    data_dir: 'C:/Users/yuzu0/Documents/zemi_2025spring/datasets/data/ffhq'
    conditional: True

model:
    in_channels: 3
    out_ch: 3
    ch: 128
    ch_mult: [1, 1, 2, 2, 4, 4]
    num_res_blocks: 2
    attn_resolutions: [16, ]
    dropout: 0.0
    ema_rate: 0.999
    ema: True
    resamp_with_conv: True
    clip_dim: 512
    use_cross_attention: true    
    context_dim: 512            
    num_heads: 4  
    use_degradation_cond: True             


diffusion:
    beta_schedule: linear
    beta_start: 0.0001
    beta_end: 0.02
    num_diffusion_timesteps: 1000

training:
    patch_n: 8
    batch_size: 4
    n_epochs: 500
    n_iters: 2000000
    snapshot_freq: 5000
    validation_freq: 5000
    logging_freq: 50 
    parse_patches: True

sampling:
    batch_size: 1
    last_only: True
    parse_patches: True

optim:
    weight_decay: 0.000
    optimizer: "Adam"
    lr: 0.00002
    amsgrad: False
    eps: 0.00000001
